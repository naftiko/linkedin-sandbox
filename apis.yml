    - aid: linkedin:job-posting-api
      name: LinkedIn Job Posting API
      description: >-
        LinkedIn's Job Posting API enables authorized third parties such as
        clients, ATS systems, and Job Distributors to post jobs directly to
        LinkedIn on behalf of customers. This API supports Basic Jobs and
        Promoted Jobs.
      humanURL: https://github.com/naftiko/linkedin-sandbox
      baseURL: http://localhost:8080/rest/linkedin-sandbox/1.0.0
      image: https://naftiko.github.io/docs/images/monogram/monogram_full_color_512.png
