          url: http://localhost:8080/rest/linkedin-conversions-api/1.0.0/sse
        - type: BackstageApi
          url: backstage/linkedin-marketing-conversions.yml

    - aid: linkedin:lead-sync-api
      name: LinkedIn Lead Sync API
      description: >-
        The Lead Sync API enables synchronization of lead generation data
        between LinkedIn and external CRM or marketing systems. Retrieve and
        manage leads captured from LinkedIn Lead Gen Forms on sponsored
        content campaigns.
      humanURL: https://github.com/naftiko/linkedin-sandbox
      baseURL: http://localhost:8080/rest/linkedin-sandbox/1.0.0
      image: https://naftiko.github.io/docs/images/monogram/monogram_full_color_512.png
