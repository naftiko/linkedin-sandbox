        - type: MockMCPServer
          url: http://localhost:8080/rest/linkedin-marketing-campaign-management-api/1.0.0/sse
        - type: BackstageApi
          url: backstage/linkedin-marketing-campaigns.yml

    - aid: linkedin:community-management-api
      name: LinkedIn Community Management API
      description: >-
        The Community Management API focuses on community management use cases
        such as social action notifications. Manage posts, reactions, comments,
        and community engagement on LinkedIn Pages and profiles.
      humanURL: https://github.com/naftiko/linkedin-sandbox
      baseURL: http://localhost:8080/rest/linkedin-sandbox/1.0.0
      image: https://naftiko.github.io/docs/images/monogram/monogram_full_color_512.png
