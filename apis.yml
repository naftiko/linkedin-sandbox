    - aid: linkedin:parent-application-management-api
      name: LinkedIn Parent Application Management API
      description: >-
        LinkedIn's Provisioning APIs allow partners to create and configure
        developer applications on behalf of their customers. This is an
        initial step to manage and enable customer integrations.
      humanURL: https://github.com/naftiko/linkedin-sandbox
      baseURL: http://localhost:8080/rest/linkedin-sandbox/1.0.0
      image: https://naftiko.github.io/docs/images/monogram/monogram_full_color_512.png
      tags:
