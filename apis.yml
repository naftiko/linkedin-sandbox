          url: backstage/linkedin-talent-learning-parent-application.yml

    - aid: linkedin:recruiter-system-connect-api
      name: LinkedIn Recruiter System Connect API
      description: >-
        The LinkedIn Recruiter System Connect (RSC) API enables partners to
        integrate their Applicant Tracking Systems (ATS) with LinkedIn
        Recruiter. This API supports configuring customer middleware
        integrations, syncing data from ATS to LinkedIn, retrieving data from
        LinkedIn, defining permissions via Access Control Lists (ACLs), and
        managing synced data lifecycle.
      humanURL: https://github.com/naftiko/linkedin-sandbox
      baseURL: http://localhost:8080/rest/linkedin-sandbox/1.0.0
      image: https://naftiko.github.io/docs/images/monogram/monogram_full_color_512.png
