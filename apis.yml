        - type: MockMCPServer
          url: http://localhost:8080/rest/linkedin-media-planning-api/1.0.0/sse
        - type: BackstageApi
          url: backstage/linkedin-marketing-media-planning.yml

    - aid: linkedin:reporting-roi-api
      name: LinkedIn Reporting & ROI API
      description: >-
        LinkedIn's Reporting and ROI APIs enable you to leverage LinkedIn
        marketing data to automate internal reporting and gain valuable
        insights. Retrieve performance data, targeting information, audience
        insights, and campaign analytics.
      humanURL: https://github.com/naftiko/linkedin-sandbox
      baseURL: http://localhost:8080/rest/linkedin-sandbox/1.0.0
      image: https://naftiko.github.io/docs/images/monogram/monogram_full_color_512.png
