        - type: BackstageApi
          url: backstage/linkedin-marketing-reporting-roi.yml

    - aid: linkedin:pages-data-portability-api
      name: LinkedIn Pages Data Portability API
      description: >-
        The LinkedIn Pages Data Portability API provides access to organization
        data for regulatory compliance with the Digital Markets Act (DMA). This
        API enables data portability for organization profiles and settings,
        ACLs and authorization, page content analytics, feed posts, reactions,
        comments, lead generation data, talent attraction data, events and live
        video, and creator analytics.
      humanURL: https://github.com/naftiko/linkedin-sandbox
      baseURL: http://localhost:8080/rest/linkedin-sandbox/1.0.0
      image: https://naftiko.github.io/docs/images/monogram/monogram_full_color_512.png
      tags:
