        - type: MockMCPServer
          url: http://localhost:8080/rest/linkedin-lead-sync-api/1.0.0/sse
        - type: BackstageApi
          url: backstage/linkedin-marketing-leads.yml

    - aid: linkedin:media-planning-api
      name: LinkedIn Media Planning API
      description: >-
        The Media Planning API helps media planners understand the reach and
        ROI that LinkedIn can offer. It allows budget allocation recommendations
        with confidence and insight into how to improve results before spending.
        This is a private API available to qualified developers who meet
        additional criteria for access.
      humanURL: https://github.com/naftiko/linkedin-sandbox
      baseURL: http://localhost:8080/rest/linkedin-sandbox/1.0.0
      image: https://naftiko.github.io/docs/images/monogram/monogram_full_color_512.png
      tags:
