        - type: BackstageApi
          url: backstage/linkedin-marketing-content.yml

    - aid: linkedin:conversions-api
      name: LinkedIn Conversions API
      description: >-
        LinkedIn's Conversions API is a conversion tracking tool that creates
        a direct connection between marketing data from an advertiser's server
        and LinkedIn. This API enables advertisers to measure the performance
        of their LinkedIn marketing campaigns no matter where the conversion
        happens and use this data to power campaign optimization.
      humanURL: https://github.com/naftiko/linkedin-sandbox
      baseURL: http://localhost:8080/rest/linkedin-sandbox/1.0.0
      image: https://naftiko.github.io/docs/images/monogram/monogram_full_color_512.png
