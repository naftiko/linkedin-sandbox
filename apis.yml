specificationVersion: '0.19'

aid: linkedin-sandbox
type: Sandbox
visibility: Public

name: LinkedIn API & MCP Sandbox
description: >-
  This is a LinkedIn sandbox that uses OpenAPI, Microcks, Bruno, and Backstage
  to provide a 3rd-party REST API and MCP sandbox for LinkedIn.

tags:
  - Social
  - Jobs
  - Recruiting
  - Marketing

image: https://naftiko.github.io/docs/images/monogram/monogram_full_color_512.png

created: '2026-02-13'
modified: '2026-02-13'

url: https://github.com/naftiko/linkedin-sandbox/blob/main/README.md

apis:

    - aid: linkedin:compliance-events-api
      name: LinkedIn Compliance Events API
      description: >-
        LinkedIn provides Compliance API Guides for monitoring, archiving, and
        management of communications for enterprises in regulated industries.
        The Compliance Events API allows applications to archive all LinkedIn
        activities from the past 30 days of a regulated, authenticated member.
      humanURL: https://github.com/naftiko/linkedin-sandbox
      baseURL: http://localhost:8080/rest/linkedin-sandbox/1.0.0
      image: https://naftiko.github.io/docs/images/monogram/monogram_full_color_512.png
      tags:
        - Compliance
        - Archiving
      properties:

        - type: OpenApi
          url: openapi/linkedin-compliance-events.yml
        - type: MockRestServer
          url: http://localhost:8080/rest/linkedin-compliance-events-api/1.0.0
        - type: MockMCPServer
          url: http://localhost:8080/rest/linkedin-compliance-events-api/1.0.0/sse
        - type: BackstageApi
          url: backstage/linkedin-compliance-events.yml

    - aid: linkedin:learning-activity-reports-api
      name: LinkedIn Learning Activity Reports API
      description: >-
        The LinkedIn Learning APIs enable access to Learning Content and
        Learning Activity Reports. This API provides learning activity reports
        including course completions, seconds of content viewed, and learner
        logins. Activity data can be aggregated by account, group, individual,
        or content.
      humanURL: https://github.com/naftiko/linkedin-sandbox
      baseURL: http://localhost:8080/rest/linkedin-sandbox/1.0.0
      image: https://naftiko.github.io/docs/images/monogram/monogram_full_color_512.png
      tags:
        - Learning
        - Reports
      properties:

        - type: OpenApi
          url: openapi/linkedin-learning-activity-reports.yml
        - type: MockRestServer
          url: http://localhost:8080/rest/linkedin-learning-activity-reports-api/1.0.0
        - type: MockMCPServer
          url: http://localhost:8080/rest/linkedin-learning-activity-reports-api/1.0.0/sse
        - type: BackstageApi
          url: backstage/linkedin-learning-activity-reports.yml

    - aid: linkedin:marketing-audience-insights-api
      name: LinkedIn Marketing Audience Insights API
      description: >-
        The Audience Insights API enables you to discover and identify audience
        segments that meet your target persona, demonstrate interest and
        engagement in relevant products, uncover insights about companies the
        target audience works for, and activate audiences for targeting in
        sponsored ad campaigns on LinkedIn.
      humanURL: https://github.com/naftiko/linkedin-sandbox
      baseURL: http://localhost:8080/rest/linkedin-sandbox/1.0.0
      image: https://naftiko.github.io/docs/images/monogram/monogram_full_color_512.png
      tags:
        - Marketing
        - Audience Insights
      properties:

        - type: OpenApi
          url: openapi/linkedin-marketing-audience-insights.yml
        - type: MockRestServer
          url: http://localhost:8080/rest/linkedin-marketing-audience-insights-api/1.0.0
        - type: MockMCPServer
          url: http://localhost:8080/rest/linkedin-marketing-audience-insights-api/1.0.0/sse
        - type: BackstageApi
          url: backstage/linkedin-marketing-audience-insights.yml

    - aid: linkedin:marketing-audiences-api
      name: LinkedIn Marketing Audiences API
      description: >-
        The LinkedIn Audiences API enables combining LinkedIn's data with your
        own data to reach the right audiences on LinkedIn. This includes
        streaming companies for account targeting, streaming users for contact
        targeting, and CSV list uploads for both account and contact targeting.
      humanURL: https://github.com/naftiko/linkedin-sandbox
      baseURL: http://localhost:8080/rest/linkedin-sandbox/1.0.0
      image: https://naftiko.github.io/docs/images/monogram/monogram_full_color_512.png
      tags:
        - Marketing
        - Audience Targeting
      properties:

        - type: OpenApi
          url: openapi/linkedin-marketing-audience.yml
        - type: MockRestServer
          url: http://localhost:8080/rest/linkedin-marketing-audiences-api/1.0.0
        - type: MockMCPServer
          url: http://localhost:8080/rest/linkedin-marketing-audiences-api/1.0.0/sse
        - type: BackstageApi
          url: backstage/linkedin-marketing-audience.yml

    - aid: linkedin:marketing-campaign-management-api
      name: LinkedIn Marketing Campaign Management API
      description: >-
        Campaign Manager is LinkedIn's online tool for creating and managing ad
        accounts and campaigns. This API provides capabilities for account
        management, campaign group management, campaign management, creative
        management, ad targeting, and forecasting.
      humanURL: https://github.com/naftiko/linkedin-sandbox
      baseURL: http://localhost:8080/rest/linkedin-sandbox/1.0.0
      image: https://naftiko.github.io/docs/images/monogram/monogram_full_color_512.png
