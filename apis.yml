    - aid: linkedin:content-api
      name: LinkedIn Content API
      description: >-
        The Content APIs enable partners and developers to create rich content
        via LinkedIn Ads with minimal operational and technical overhead.
        Manage ad creatives, images, videos, and other media assets for
        LinkedIn advertising campaigns.
      humanURL: https://github.com/naftiko/linkedin-sandbox
      baseURL: http://localhost:8080/rest/linkedin-sandbox/1.0.0
      image: https://naftiko.github.io/docs/images/monogram/monogram_full_color_512.png
