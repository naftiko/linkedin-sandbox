      properties:

        - type: OpenApi
          url: openapi/linkedin-regulations-data-portability.yml
        - type: MockRestServer
          url: http://localhost:8080/rest/linkedin-pages-data-portability-api/1.0.0
        - type: MockMCPServer
          url: http://localhost:8080/rest/linkedin-pages-data-portability-api/1.0.0/sse
        - type: BackstageApi
          url: backstage/linkedin-regulations-data-portability.yml

